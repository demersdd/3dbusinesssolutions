*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--body);}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:.9rem 2rem;background:rgba(5,10,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}

.nav-back:hover{color:var(--accent);}
.nav-title{font-family:var(--mono);font-size:.7rem;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;}

/* LAYOUT */
.layout{display:flex;height:100vh;padding-top:48px;position:relative;z-index:1;}

.panel-header{padding:1.2rem 1.4rem .8rem;border-bottom:1px solid var(--border);}
.panel-title{font-family:var(--head);font-size:1.5rem;font-weight:900;text-transform:uppercase;line-height:1;}
.panel-title em{font-style:normal;color:var(--accent);}
.panel-sub{font-family:var(--mono);font-size:.6rem;color:var(--muted);margin-top:.4rem;letter-spacing:.08em;}

.source-badge{display:inline-flex;align-items:center;gap:.4rem;font-family:var(--mono);font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .7rem;border:1px solid var(--border);margin-top:.7rem;}
.source-badge.live{border-color:var(--accent3);color:var(--accent3);}
.source-badge.cached{border-color:var(--accent2);color:var(--accent2);}
.source-badge.loading{border-color:var(--muted);color:var(--muted);animation:pulse 1.4s ease-in-out infinite;}
.source-badge.error{border-color:var(--cap-low);color:var(--cap-low);}
.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* SEARCH */
.search-wrap{padding:.8rem 1.2rem;border-bottom:1px solid var(--border);}
.search-input{width:100%;background:var(--panel);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:.75rem;padding:.55rem .8rem;letter-spacing:.05em;outline:none;transition:border-color .2s;}
.search-input::placeholder{color:var(--muted);}
.search-input:focus{border-color:var(--accent);}

.legend{padding:.8rem 1.2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.6rem;}

.legend-bar{flex:1;height:6px;background:linear-gradient(to right,var(--cap-low),var(--cap-mid),var(--cap-high));border-radius:2px;}

.state{fill:#0c1825;stroke:rgba(0,229,255,.12);stroke-width:.5px;}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmtM(n) {
  if (n == null) return '—';
  const sign = n < 0 ? '-' : '';
  return sign + '$' + (Math.abs(n) / 1e6).toFixed(1) + 'M';
}
function fmtFull(n) {
  if (n == null) return '—';
  const sign = n < 0 ? '-' : '';
  return sign + '$' + Math.abs(n).toLocaleString();
}

// ─── PARSE OTC HTML (client-side) ─────────────────────────────────────────────
function parseCapHtml(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const rows = [...doc.querySelectorAll('tr')];
  const teams = [];

  // Detect column positions from header
  let capSpaceCol = -1, activeCapCol = -1, deadCapCol = -1;
  const headerRow = rows.find(r => r.querySelectorAll('th').length > 2);
  if (headerRow) {
    [...headerRow.querySelectorAll('th')].forEach((th, i) => {
      const t = th.textContent.trim().toLowerCase();
      if (capSpaceCol < 0 && (t.includes('cap space') || t.includes('space'))) capSpaceCol = i;
      if (activeCapCol < 0 && (t.includes('active') || t.includes('used'))) activeCapCol = i;
      if (deadCapCol < 0 && t.includes('dead')) deadCapCol = i;
    });
  }
  if (capSpaceCol < 0) capSpaceCol = 2;
  if (activeCapCol < 0) activeCapCol = 3;
  if (deadCapCol < 0) deadCapCol = 4;

  const parseMoney = td => {
    if (!td) return 0;
    const raw = td.textContent.replace(/[$,\s]/g, '');
    const neg = /\(/.test(td.textContent) || /^-/.test(raw);
    const val = parseInt(raw.replace(/[^0-9]/g, ''), 10) || 0;
    return neg ? -val : val;
  };

  for (const row of rows) {
    const cells = [...row.querySelectorAll('td')];
    if (cells.length < 3) continue;
    const linkCell = cells.find(c => c.querySelector('a[href]'));
    if (!linkCell) continue;
    const name = linkCell.querySelector('a').textContent.trim();
    if (!name || name.length < 5 || /^\d/.test(name)) continue;
    teams.push({
      name,
      capSpace:  parseMoney(cells[capSpaceCol]),
      capUsed:   parseMoney(cells[activeCapCol]),
      deadCap:   parseMoney(cells[deadCapCol]),
    });
  }
  return teams;
}

// ─── MATCH OTC TEAM NAMES TO TEAM OBJECTS ────────────────────────────────────
function mergeCapData(capRows) {
  const byName = {};
  TEAMS.forEach(t => { byName[t.name.toLowerCase()] = t; });

  const matched = new Set();
  for (const row of capRows) {
    const key = row.name.toLowerCase();
    // Exact match first
    if (byName[key]) {
      Object.assign(byName[key], { capSpace: row.capSpace, capUsed: row.capUsed, deadCap: row.deadCap });
      matched.add(key);
      continue;
    }
    // Fuzzy: find TEAMS entry whose name contains or is contained by the row name
    for (const [k, t] of Object.entries(byName)) {
      if (matched.has(k)) continue;
      const words = k.split(' ');
      if (words.some(w => key.includes(w) && w.length > 4)) {
        Object.assign(t, { capSpace: row.capSpace, capUsed: row.capUsed, deadCap: row.deadCap });
        matched.add(k);
        break;
      }
    }
  }
}

// ─── APPLY FALLBACK ───────────────────────────────────────────────────────────
function applyFallback() {
  TEAMS.forEach(t => {
    if (t.capSpace == null) {
      const fb = FALLBACK[t.name];
      if (fb) Object.assign(t, fb);
    }
  });
}

// ─── COLOR SCALE ─────────────────────────────────────────────────────────────
function capColor(val) {
  if (val == null) return '#6a8fa8';
  // -50M → 0 → 120M+
  const stops = [
    { v: -50e6, r:230, g:57,  b:70  },
    { v:  0,    r:255, g:209, b:102 },
    { v: 120e6, r:57,  g:255, b:20  },
  ];
  const clamp = Math.max(stops[0].v, Math.min(stops[stops.length-1].v, val));
  for (let i = 0; i < stops.length - 1; i++) {
    if (clamp <= stops[i+1].v) {
      const t = (clamp - stops[i].v) / (stops[i+1].v - stops[i].v);
      const r = Math.round(stops[i].r + t*(stops[i+1].r - stops[i].r));
      const g = Math.round(stops[i].g + t*(stops[i+1].g - stops[i].g));
      const b = Math.round(stops[i].b + t*(stops[i+1].b - stops[i].b));
      return `rgb(${r},${g},${b})`;
    }
  }
  return `rgb(${stops[stops.length-1].r},${stops[stops.length-1].g},${stops[stops.length-1].b})`;
}

// ─── D3 MAP ───────────────────────────────────────────────────────────────────
let svg, g, projection, path, markers;

function initMap() {
  const container = document.getElementById('mapArea');
  const W = container.clientWidth;
  const H = container.clientHeight;

  svg = d3.select('#mapSvg').attr('viewBox', `0 0 ${W} ${H}`);
  g = svg.append('g');

  projection = d3.geoAlbersUsa()
    .translate([W / 2, H / 2])
    .scale(W * 1.25);

  path = d3.geoPath().projection(projection);

  // Zoom + pan
  const zoom = d3.zoom()
    .scaleExtent([1, 8])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us => {
    // States fill
    g.append('g').selectAll('path.state')
      .data(topojson.feature(us, us.objects.states).features)
      .join('path')
      .attr('class', 'state')
      .attr('d', path);

    // State borders
    g.append('path')
      .datum(topojson.mesh(us, us.objects.states, (a, b) => a !== b))
      .attr('class', 'state-border')
      .attr('d', path);

    // Team marker group (rendered after cap data loads)
    g.append('g').attr('class', 'markers-group');
    document.getElementById('loadOverlay').classList.add('hidden');
  });
}

function renderMarkers() {
  const markerGroup = g.select('.markers-group');
  markerGroup.selectAll('*').remove();

  TEAMS.forEach(team => {
    const pos = projection([team.lng, team.lat]);
    if (!pos) return;

    const color = capColor(team.capSpace);
    const grp = markerGroup.append('g')
      .attr('class', 'marker-grp')
      .attr('transform', `translate(${pos[0]},${pos[1]})`)
      .style('cursor', 'pointer');

    // Glow ring
    grp.append('circle')
      .attr('r', 13)
      .attr('fill', color)
      .attr('opacity', .12);

    // Main circle
    grp.append('circle')
      .attr('class', 'team-marker')
      .attr('r', 8)
      .attr('fill', color)
      .attr('stroke', 'rgba(255,255,255,.35)')
      .attr('stroke-width', 1.2);

    // Abbreviation label
    grp.append('text')
      .attr('class', 'team-label')
      .attr('dy', '.35em')
      .text(team.abbr);

    // Interactions
    grp
      .on('mouseover', function(event) { showTooltip(event, team); })
      .on('mousemove', function(event) { moveTooltip(event); })
      .on('mouseout', hideTooltip)
      .on('click', function() { highlightTeam(team.name); });
  });
}

// ─── TOOLTIP ─────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function showTooltip(event, team) {
  document.getElementById('ttTeam').textContent = team.name;
  document.getElementById('ttCity').textContent = team.city;

  const spaceEl = document.getElementById('ttSpace');
  spaceEl.textContent = fmtFull(team.capSpace);
  spaceEl.className = 'tt-value ' + (team.capSpace >= 0 ? 'positive' : 'negative');

  document.getElementById('ttUsed').textContent = fmtFull(team.capUsed);
  document.getElementById('ttDead').textContent = fmtFull(team.deadCap);

  tooltip.classList.add('visible');
  moveTooltip(event);
}

function moveTooltip(event) {
  const mapRect = document.getElementById('mapArea').getBoundingClientRect();
  let x = event.clientX - mapRect.left + 16;
  let y = event.clientY - mapRect.top - 10;
  if (x + 240 > mapRect.width)  x = event.clientX - mapRect.left - 240;
  if (y + 160 > mapRect.height) y = event.clientY - mapRect.top - 160;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function hideTooltip() { tooltip.classList.remove('visible'); }

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('teamList');
  const sorted = [...TEAMS].sort((a, b) => (b.capSpace || 0) - (a.capSpace || 0));
  const maxSpace = Math.max(...sorted.map(t => t.capSpace || 0));

  list.innerHTML = '';
  sorted.forEach((team, i) => {
    const cs = team.capSpace || 0;
    const barPct = maxSpace > 0 ? Math.max(0, cs / maxSpace * 100) : 0;
    const color = capColor(cs);
    const item = document.createElement('div');
    item.className = 'team-item';
    item.dataset.name = team.name.toLowerCase();
    item.innerHTML = `
      <span class="team-rank">${i + 1}</span>
      <span class="team-dot" style="background:${color}"></span>
      <div class="team-info">
        <div class="team-name">${team.name}</div>
        <div class="team-bar-wrap"><div class="team-bar" style="width:${barPct}%;background:${color}"></div></div>
      </div>
      <span class="team-cap ${cs >= 0 ? 'positive' : 'negative'}">${fmtM(cs)}</span>
    `;
    item.addEventListener('click', () => highlightTeam(team.name));
    list.appendChild(item);
  });
}

function highlightTeam(name) {
  // Sidebar highlight
  document.querySelectorAll('.team-item').forEach(el => {
    el.classList.toggle('active', el.dataset.name === name.toLowerCase());
    if (el.dataset.name === name.toLowerCase()) el.scrollIntoView({ block: 'nearest' });
  });

  // Pulse the map marker
  g.selectAll('.marker-grp').each(function(d, i) {
    const grp = d3.select(this);
    // Find by team abbr text
    const lbl = grp.select('text').text();
    const team = TEAMS.find(t => t.abbr === lbl);
    if (team && team.name === name) {
      grp.select('.team-marker')
        .attr('r', 12)
        .transition().duration(400)
        .attr('r', 8);
    }
  });
}

// ─── SEARCH ──────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.team-item').forEach(el => {
    el.classList.toggle('hidden', q.length > 0 && !el.dataset.name.includes(q));
  });
});

// ─── FETCH LIVE DATA ─────────────────────────────────────────────────────────
async function fetchCapData() {
  const badge = document.getElementById('sourceBadge');
  const badgeText = document.getElementById('badgeText');

  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ _service: 'overthecap' }),
    });

    if (!resp.ok) throw new Error(`Worker ${resp.status}`);
    const data = await resp.json();

    if (data.error || !data.html) throw new Error(data.error || 'No data');

    const parsed = parseCapHtml(data.html);
    if (parsed.length >= 20) {
      mergeCapData(parsed);
      applyFallback(); // fill any unmatched teams
      badge.className = 'source-badge live';
      badgeText.textContent = 'Live · overthecap.com';
    } else {
      throw new Error('Parse yielded insufficient data');
    }
  } catch (err) {
    console.warn('Live fetch failed, using estimated data:', err.message);
    applyFallback();
    badge.className = 'source-badge cached';
    badgeText.textContent = 'Estimated · overthecap.com';
  }

  renderMarkers();
  renderSidebar();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
initMap();
fetchCapData();

// Resize handler
window.addEventListener('resize', () => {
  const container = document.getElementById('mapArea');
  const W = container.clientWidth;
  const H = container.clientHeight;
  svg.attr('viewBox', `0 0 ${W} ${H}`);
  projection.translate([W / 2, H / 2]).scale(W * 1.25);
  g.selectAll('path.state').attr('d', path);
  g.select('path.state-border').attr('d', path);
  renderMarkers();
});
</script>
